name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_PROJECT_NAME: zero_trust_client
  FLUTTER_ORG: com.zerotrust
  APP_DISPLAY_NAME: ZeroTrustClient

defaults:
  run:
    working-directory: .

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "Invalid release tag: $TAG (expected format v1.2.3)"
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG (version $VERSION)"

  build-linux:
    name: Build Linux
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev

      - name: Ensure platform scaffolding
        run: |
          flutter create . \
            --project-name ${{ env.FLUTTER_PROJECT_NAME }} \
            --org ${{ env.FLUTTER_ORG }} \
            --platforms=linux,windows,macos,android,ios,web

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux artifact
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARTIFACT="zero-trust-client_${VERSION}_linux-x64.tar.gz"
          tar -czf "$ARTIFACT" -C build/linux/x64/release bundle
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  build-windows:
    name: Build Windows
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Ensure platform scaffolding
        run: |
          flutter create . `
            --project-name ${{ env.FLUTTER_PROJECT_NAME }} `
            --org ${{ env.FLUTTER_ORG }} `
            --platforms=linux,windows,macos,android,ios,web

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows artifact
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $artifact = "zero-trust-client_${version}_windows-x64.zip"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $artifact
          "ARTIFACT=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  build-macos:
    name: Build macOS
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Ensure platform scaffolding
        run: |
          flutter create . \
            --project-name ${{ env.FLUTTER_PROJECT_NAME }} \
            --org ${{ env.FLUTTER_ORG }} \
            --platforms=linux,windows,macos,android,ios,web

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package macOS artifact
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARTIFACT="zero-trust-client_${VERSION}_macos-universal.zip"
          cd build/macos/Build/Products/Release
          zip -r "../../../../../${ARTIFACT}" "${{ env.FLUTTER_PROJECT_NAME }}.app"
          cd -
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  build-android:
    name: Build Android
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure platform scaffolding
        run: |
          flutter create . \
            --project-name ${{ env.FLUTTER_PROJECT_NAME }} \
            --org ${{ env.FLUTTER_ORG }} \
            --platforms=linux,windows,macos,android,ios,web

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Package Android artifact
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARTIFACT="zero-trust-client_${VERSION}_android-arm64.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$ARTIFACT"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build-linux
      - build-windows
      - build-macos
      - build-android
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: ls -lah dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ env.APP_DISPLAY_NAME }} ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: dist/*
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
